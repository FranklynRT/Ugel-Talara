version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ugel-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - ugel-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  # Opcional: Si quieres desarrollar con Docker también
  frontend-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ugel-frontend-dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:9000/api
    command: npm run dev
    profiles:
      - dev
    networks:
      - ugel-network

networks:
  ugel-network:
    driver: bridge


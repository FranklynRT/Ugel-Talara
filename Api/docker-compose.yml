version: '3.8'

services:
  # API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ugel-api
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=production
      - PORT=9000
    env_file:
      - .env
    volumes:
      # Montar uploads para persistencia
      - ./uploads:/app/uploads
    networks:
      - ugel-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # API Development (con hot reload)
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ugel-api-dev
    ports:
      - "9000:9000"
    environment:
      - NODE_ENV=development
      - PORT=9000
    env_file:
      - .env
    volumes:
      # Montar código fuente para hot reload
      - ./src:/app/src
      - ./uploads:/app/uploads
    networks:
      - ugel-network
    restart: unless-stopped
    profiles:
      - dev

networks:
  ugel-network:
    driver: bridge

